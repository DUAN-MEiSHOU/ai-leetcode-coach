<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI LeetCode Coach</title>
    <link rel="stylesheet" href="./sidepanel.css">
  </head>
  <body>
    <main class="panel-shell">
      <header class="panel-header">
        <p class="eyebrow">Local extension shell</p>
        <h1>AI LeetCode Coach</h1>
      </header>

      <section class="input-section" aria-labelledby="context-label">
        <label for="coach-mode">Coaching mode</label>
        <select id="coach-mode">
          <option value="explain_problem">Explain problem</option>
          <option value="hint">Progressive hint</option>
          <option value="pseudocode">Pseudocode</option>
          <option value="complete_solution">Complete solution</option>
          <option value="explain_code" selected>Explain code</option>
          <option value="explain_line">Explain selected line</option>
          <option value="explain_syntax">Explain syntax</option>
          <option value="explain_library">Explain library function</option>
          <option value="analyse_error">Analyse error</option>
        </select>
        <label id="context-label" for="coach-input">Problem, code, or error text</label>
        <textarea
          id="coach-input"
          rows="12"
          placeholder="Paste problem text, code, or an error message here."
        ></textarea>
        <button id="send-button" type="button">Send</button>
      </section>

      <section class="output-section" aria-labelledby="output-title">
        <h2 id="output-title">Coach Output</h2>
        <div id="coach-output" class="output-box" aria-live="polite">
          Paste or send selected text, then click Send for a coach explanation.
        </div>
      </section>
    </main>

    <script src="./sidepanel.js"></script>
  </body>
</html>
