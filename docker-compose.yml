services:
  postgres:
    image: postgres:17
    container_name: ai-leetcode-coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leetcode_coach
      POSTGRES_USER: leetcode_coach
      POSTGRES_PASSWORD: leetcode_coach
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetcode_coach -d leetcode_coach"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
